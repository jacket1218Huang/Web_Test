<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高雄辦公室值日表</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --sky:#e0f2fe; --sky-mid:#bae6fd; --sky-deep:#7dd3fc;
    --blue:#0ea5e9; --blue-dark:#0284c7; --indigo:#6366f1;
    --mint:#d1fae5; --mint-deep:#6ee7b7;
    --coral:#fee2e2; --coral-deep:#fca5a5;
    --amber:#fef3c7; --amber-deep:#fcd34d;
    --lavender:#ede9fe; --lavender-deep:#c4b5fd;
    --white:#ffffff;
    --gray-100:#f1f5f9; --gray-200:#e2e8f0; --gray-400:#94a3b8;
    --gray-600:#475569; --gray-700:#334155; --gray-800:#1e293b;
    --shadow:0 4px 16px rgba(14,165,233,.12);
    --shadow-lg:0 8px 32px rgba(14,165,233,.18);
    --radius:16px; --radius-sm:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Nunito','Noto Sans TC',sans-serif;
    background:linear-gradient(135deg,#e0f2fe 0%,#f0f9ff 40%,#e0f7fa 70%,#ecfdf5 100%);
    min-height:100vh;padding:24px 16px 40px;color:var(--gray-700);
  }
  .header{text-align:center;margin-bottom:24px;}
  .header-badge{
    display:inline-flex;align-items:center;gap:8px;
    background:var(--white);border:2px solid var(--sky-deep);border-radius:50px;
    padding:6px 18px;font-size:13px;font-weight:700;color:var(--blue-dark);
    letter-spacing:.5px;margin-bottom:12px;
  }
  .header-title{font-size:clamp(26px,5vw,40px);font-weight:900;color:var(--gray-800);}
  .header-title span{
    background:linear-gradient(135deg,var(--blue),var(--indigo));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  }
  .header-sub{margin-top:6px;font-size:14px;color:var(--gray-400);font-weight:600;}

  /* SYNC BAR */
  .sync-bar{
    background:linear-gradient(135deg,#f0fdf4,#ecfdf5);
    border:2px dashed var(--mint-deep);border-radius:var(--radius);
    padding:14px 20px;margin-bottom:20px;
    display:flex;align-items:center;gap:14px;flex-wrap:wrap;
  }
  .sync-bar-icon{font-size:22px;}
  .sync-bar-label{font-size:12px;font-weight:800;color:#065f46;text-transform:uppercase;letter-spacing:.8px;}
  .sync-bar-sub{font-size:11px;color:#6b7280;font-weight:600;margin-top:2px;}
  .sync-status{font-size:12px;font-weight:700;padding:6px 14px;border-radius:50px;white-space:nowrap;}
  .sync-status.idle   {background:var(--gray-100);color:var(--gray-400);}
  .sync-status.success{background:var(--mint);color:#065f46;border:1.5px solid var(--mint-deep);}
  .sync-status.error  {background:var(--coral);color:#dc2626;}
  .excel-preview{
    width:100%;background:white;border:1.5px solid var(--mint-deep);
    border-radius:var(--radius-sm);padding:8px 14px;
    font-size:12px;font-weight:700;display:none;flex-wrap:wrap;gap:8px;align-items:center;
  }
  .excel-preview.visible{display:flex;}
  .excel-chip{background:var(--mint);border:1.5px solid var(--mint-deep);border-radius:50px;padding:3px 10px;font-size:12px;font-weight:800;color:#065f46;}
  .excel-chip.leave{background:var(--coral);border-color:var(--coral-deep);color:#dc2626;}

  /* CONTROL */
  .control-panel{
    background:var(--white);border-radius:var(--radius);padding:20px 24px;
    margin-bottom:20px;box-shadow:var(--shadow);border:1.5px solid var(--sky-mid);
    display:flex;flex-wrap:wrap;gap:16px;align-items:flex-end;
  }
  .control-group{display:flex;flex-direction:column;gap:6px;}
  .control-label{font-size:12px;font-weight:800;color:var(--blue-dark);text-transform:uppercase;letter-spacing:.8px;}
  .control-select{
    padding:9px 14px;border-radius:var(--radius-sm);border:2px solid var(--sky-mid);
    background:var(--sky);color:var(--gray-700);font-family:inherit;
    font-size:14px;font-weight:700;outline:none;cursor:pointer;
  }
  .control-select:focus{border-color:var(--blue);}
  .vacation-select-wrap{display:flex;flex-wrap:wrap;gap:8px;}
  .vacation-chip{
    display:flex;align-items:center;gap:6px;
    background:var(--gray-100);border:2px solid var(--gray-200);
    border-radius:50px;padding:6px 14px;font-size:13px;font-weight:700;
    cursor:pointer;color:var(--gray-600);user-select:none;transition:all .2s;
  }
  .vacation-chip:hover{border-color:var(--blue);color:var(--blue-dark);}
  .vacation-chip.active{background:var(--coral);border-color:var(--coral-deep);color:#dc2626;}
  .vacation-chip .chip-dot{width:8px;height:8px;border-radius:50%;background:var(--gray-400);transition:background .2s;}
  .vacation-chip.active .chip-dot{background:#ef4444;}
  .btn-update{
    padding:10px 22px;background:linear-gradient(135deg,var(--blue),var(--indigo));
    color:white;border:none;border-radius:var(--radius-sm);
    font-family:inherit;font-size:14px;font-weight:800;cursor:pointer;
    box-shadow:0 4px 12px rgba(14,165,233,.3);transition:all .2s;
  }
  .btn-update:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(14,165,233,.4);}
  .today-display{
    background:var(--amber);border:2px solid var(--amber-deep);
    border-radius:var(--radius-sm);padding:9px 16px;
    font-size:13px;font-weight:800;color:#92400e;white-space:nowrap;
  }

  /* INFO CARDS */
  .info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px;}
  .info-card{
    background:var(--white);border-radius:var(--radius);
    padding:20px;box-shadow:var(--shadow);border:1.5px solid var(--sky-mid);
    position:relative;overflow:hidden;
  }
  .info-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;border-radius:var(--radius) var(--radius) 0 0;}
  .info-card.duty::before{background:linear-gradient(90deg,var(--blue),var(--sky-deep));}
  .info-card.sub::before{background:linear-gradient(90deg,var(--lavender-deep),var(--indigo));}
  .info-card.vacation-card::before{background:linear-gradient(90deg,var(--coral-deep),#f87171);}
  .info-card.holiday-card::before{background:linear-gradient(90deg,var(--amber-deep),#f59e0b);}
  .info-card-label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}
  .info-card.duty .info-card-label{color:var(--blue-dark);}
  .info-card.sub .info-card-label{color:var(--indigo);}
  .info-card.vacation-card .info-card-label{color:#dc2626;}
  .info-card.holiday-card .info-card-label{color:#b45309;}
  .person-avatar{
    display:inline-flex;align-items:center;justify-content:center;
    width:52px;height:52px;border-radius:50%;
    font-size:15px;font-weight:900;letter-spacing:-.5px;margin-bottom:8px;
  }
  .person-avatar.julia {background:linear-gradient(135deg,#bfdbfe,#60a5fa);color:#1d4ed8;}
  .person-avatar.kalia {background:linear-gradient(135deg,#d1fae5,#34d399);color:#065f46;}
  .person-avatar.lluvia{background:linear-gradient(135deg,#ede9fe,#a78bfa);color:#4c1d95;}
  .person-avatar.lorene{background:linear-gradient(135deg,#fce7f3,#f9a8d4);color:#9d174d;}
  .person-name{font-size:20px;font-weight:900;color:var(--gray-800);}
  .person-tag {font-size:12px;font-weight:700;color:var(--gray-400);margin-top:2px;}
  .vacation-list{display:flex;flex-wrap:wrap;gap:6px;}
  .vacation-tag{background:var(--coral);border:1.5px solid var(--coral-deep);border-radius:50px;padding:4px 12px;font-size:13px;font-weight:800;color:#dc2626;}
  .no-one{font-size:15px;font-weight:700;color:var(--gray-400);font-style:italic;}
  .holiday-list{display:flex;flex-direction:column;gap:6px;max-height:160px;overflow-y:auto;}
  .holiday-item{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:#78350f;}
  .holiday-dot{width:6px;height:6px;border-radius:50%;background:var(--amber-deep);flex-shrink:0;}
  .holiday-date{color:var(--gray-400);font-weight:600;font-size:12px;}

  /* TABLE */
  .table-wrap{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow-lg);border:1.5px solid var(--sky-mid);overflow:hidden;}
  .table-header-bar{
    background:linear-gradient(135deg,var(--blue),var(--indigo));
    padding:16px 24px;display:flex;align-items:center;justify-content:space-between;
  }
  .table-header-bar h2{color:white;font-size:17px;font-weight:900;}
  .table-header-bar span{color:rgba(255,255,255,.8);font-size:13px;font-weight:700;}
  table{width:100%;border-collapse:collapse;}
  thead th{
    background:var(--sky);color:var(--blue-dark);font-size:12px;font-weight:800;
    text-transform:uppercase;letter-spacing:.8px;padding:14px 16px;
    text-align:left;border-bottom:2px solid var(--sky-mid);
  }
  tbody tr{border-bottom:1.5px solid var(--sky);transition:background .15s;}
  tbody tr:last-child{border-bottom:none;}
  tbody tr:hover{background:var(--sky);}
  tbody tr.current-week{background:linear-gradient(90deg,rgba(14,165,233,.07),transparent);}
  tbody tr.current-week td:first-child{border-left:4px solid var(--blue);}
  tbody td{padding:14px 16px;font-size:14px;font-weight:700;color:var(--gray-700);vertical-align:middle;}
  .week-badge{
    display:inline-flex;align-items:center;gap:6px;
    background:var(--sky);border:1.5px solid var(--sky-deep);
    border-radius:8px;padding:4px 10px;font-size:12px;font-weight:800;color:var(--blue-dark);white-space:nowrap;
  }
  .week-badge.current{background:linear-gradient(135deg,var(--blue),var(--indigo));border-color:transparent;color:white;}
  .week-date{font-size:11px;font-weight:600;color:var(--gray-400);margin-top:3px;}
  .person-cell{display:flex;align-items:center;gap:10px;}
  .mini-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;flex-shrink:0;}
  .mini-avatar.julia {background:linear-gradient(135deg,#bfdbfe,#60a5fa);color:#1d4ed8;}
  .mini-avatar.kalia {background:linear-gradient(135deg,#d1fae5,#34d399);color:#065f46;}
  .mini-avatar.lluvia{background:linear-gradient(135deg,#ede9fe,#a78bfa);color:#4c1d95;}
  .mini-avatar.lorene{background:linear-gradient(135deg,#fce7f3,#f9a8d4);color:#9d174d;}
  .replaced-badge{
    display:inline-flex;align-items:center;gap:4px;
    background:var(--coral);border:1.5px solid var(--coral-deep);
    border-radius:50px;padding:2px 8px;font-size:11px;font-weight:800;color:#dc2626;margin-left:6px;
  }
  .tasks-cell{display:flex;flex-wrap:wrap;gap:5px;}
  .task-pill{background:var(--mint);border:1.5px solid var(--mint-deep);border-radius:50px;padding:3px 10px;font-size:11px;font-weight:800;color:#065f46;white-space:nowrap;}
  @media(max-width:640px){
    .control-panel{flex-direction:column;}
    .info-grid{grid-template-columns:1fr 1fr;}
    thead th:nth-child(4){display:none;}
    tbody td:nth-child(4){display:none;}
  }
  @media(max-width:420px){.info-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div class="header">
  <div class="header-badge">&#x1F3E2; Kaohsiung Office</div>
  <h1 class="header-title">高雄辦公室<span>值日表</span></h1>
  <p class="header-sub">Office Duty Roster &middot; 輪值排班系統</p>
</div>

<!-- SYNC BAR -->
<div class="sync-bar">
  <div class="sync-bar-icon">&#x1F4CA;</div>
  <div>
    <div class="sync-bar-label">Excel 自動同步</div>
    <div class="sync-bar-sub">172.17.11.81 / kaohsiung_duty_roster.xlsx</div>
  </div>
  <button class="btn-update" onclick="fetchExcelFromServer()" style="background:linear-gradient(135deg,#059669,#0284c7);">&#x1F504; 立即同步</button>
  <div class="sync-status idle" id="syncStatus">&#x23F3; 尚未同步</div>
  <div class="excel-preview" id="excelPreview"></div>
</div>

<!-- CONTROL PANEL -->
<div class="control-panel">
  <div class="control-group">
    <div class="control-label">&#x1F4C5; 年份</div>
    <select class="control-select" id="selYear"></select>
  </div>
  <div class="control-group">
    <div class="control-label">&#x1F5D3; 月份</div>
    <select class="control-select" id="selMonth"></select>
  </div>
  <div class="control-group">
    <div class="control-label">&#x1F3D6; 休假人員</div>
    <div class="vacation-select-wrap" id="vacationChips"></div>
  </div>
  <button class="btn-update" onclick="updateAll()">&#x1F504; 更新排班</button>
  <div class="today-display" id="todayDisplay"></div>
</div>

<!-- INFO CARDS -->
<div class="info-grid">
  <div class="info-card duty">
    <div class="info-card-label">&#x2B50; 本週值日人</div>
    <div id="cardDuty"></div>
  </div>
  <div class="info-card sub">
    <div class="info-card-label">&#x1F501; 輪替代理人</div>
    <div id="cardSub"></div>
  </div>
  <div class="info-card vacation-card">
    <div class="info-card-label">&#x1F3D6; 目前休假人員</div>
    <div id="cardVacation"></div>
  </div>
  <div class="info-card holiday-card">
    <div class="info-card-label">&#x1F38C; 本月法定假日</div>
    <div id="cardHoliday"></div>
  </div>
</div>

<!-- TABLE -->
<div class="table-wrap">
  <div class="table-header-bar">
    <h2>&#x1F4CB; 未來四週值日排班表</h2>
    <span id="tableSubtitle"></span>
  </div>
  <div style="overflow-x:auto;">
    <table>
      <thead>
        <tr>
          <th>週次</th><th>值日人</th><th>代理人</th><th>值日任務</th>
        </tr>
      </thead>
      <tbody id="scheduleBody"></tbody>
    </table>
  </div>
</div>

<script>
const STAFF  = ['Julia','Lluvia','Kalia','Lorene'];
const DEPUTY = {Julia:'Lluvia',Lluvia:'Julia',Kalia:'Lorene',Lorene:'Kalia'};
const TW_FIXED = {'1-1':'元旦','2-28':'和平紀念日','4-4':'兒童節','4-5':'清明節','5-1':'勞動節','10-10':'國慶日'};
const TW_YEARLY = {
  2025:{'1-29':'除夕','1-30':'春節','1-31':'春節','2-1':'春節','2-2':'春節','2-3':'春節','6-2':'端午節','10-6':'中秋節'},
  2026:{'2-17':'除夕','2-18':'春節','2-19':'春節','2-20':'春節','2-21':'春節','2-22':'春節','6-20':'端午節','9-25':'中秋節'}
};
let selectedYear  = new Date().getFullYear();
let selectedMonth = new Date().getMonth() + 1;
let onLeave = new Set();
let ANCHOR_OVERRIDE = null;
const ANCHOR_DATE = new Date(2026, 2, 9);
const ANCHOR_IDX  = 0;

function getMondayOf(d) {
  const c = new Date(d), day = c.getDay();
  c.setDate(c.getDate() + (day===0 ? -6 : 1-day));
  c.setHours(0,0,0,0); return c;
}
function weeksBetween(a,b) { return Math.round((b-a)/(7*86400000)); }
function getDutyIndex(monday) {
  if (ANCHOR_OVERRIDE)
    return ((ANCHOR_OVERRIDE.idx + weeksBetween(ANCHOR_OVERRIDE.monday, monday)) % 4 + 4) % 4;
  return ((ANCHOR_IDX + weeksBetween(getMondayOf(ANCHOR_DATE), monday)) % 4 + 4) % 4;
}
function getActualDuty(idx, leave) {
  const sched = STAFF[idx];
  if (!leave.has(sched)) return {idx, skipped:false};
  const dep = DEPUTY[sched];
  if (dep && !leave.has(dep)) return {idx:STAFF.indexOf(dep), skipped:true};
  for (let i=1;i<4;i++) { const j=(idx+i)%4; if(!leave.has(STAFF[j])) return {idx:j,skipped:true}; }
  return {idx, skipped:false};
}
function fmtDate(d) { return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`; }
function ac(n) { return n.toLowerCase(); }
function getHolidays(y,m) {
  const r=[];
  for(const[k,n]of Object.entries(TW_FIXED)){const[mo,d]=k.split('-').map(Number);if(mo===m)r.push({date:d,name:n});}
  for(const[k,n]of Object.entries(TW_YEARLY[y]||{})){const[mo,d]=k.split('-').map(Number);if(mo===m)r.push({date:d,name:n});}
  return r.sort((a,b)=>a.date-b.date);
}

function initControls() {
  const yr=document.getElementById('selYear'), now=new Date();
  for(let y=now.getFullYear()-1;y<=now.getFullYear()+2;y++){
    const o=document.createElement('option');o.value=y;o.textContent=y+' 年';if(y===selectedYear)o.selected=true;yr.appendChild(o);
  }
  yr.addEventListener('change',()=>{selectedYear=+yr.value;updateAll();});
  const mo=document.getElementById('selMonth');
  '1月 2月 3月 4月 5月 6月 7月 8月 9月 10月 11月 12月'.split(' ').forEach((m,i)=>{
    const o=document.createElement('option');o.value=i+1;o.textContent=m;if(i+1===selectedMonth)o.selected=true;mo.appendChild(o);
  });
  mo.addEventListener('change',()=>{selectedMonth=+mo.value;updateAll();});
  renderChips();
}

function renderChips() {
  const wrap=document.getElementById('vacationChips');
  wrap.innerHTML='';
  STAFF.forEach(name=>{
    const chip=document.createElement('div');
    chip.className='vacation-chip';chip.dataset.name=name;
    chip.innerHTML=`<span class="chip-dot"></span>${name}`;
    chip.addEventListener('click',()=>{
      if(onLeave.has(name)){onLeave.delete(name);chip.classList.remove('active');}
      else{onLeave.add(name);chip.classList.add('active');}
      updateAll();
    });
    if(onLeave.has(name)) chip.classList.add('active');
    wrap.appendChild(chip);
  });
}

function updateAll() {
  const now=new Date();
  document.getElementById('todayDisplay').textContent=
    `\uD83D\uDCCC 今天：${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}`;
  updateInfoCards(); updateTable();
}

function updateInfoCards() {
  const tm=getMondayOf(new Date()), di=getDutyIndex(tm);
  const sched=STAFF[di], {idx:ai,skipped}=getActualDuty(di,onLeave);
  const actual=STAFF[ai], dep=DEPUTY[sched]||STAFF[(di+1)%4];

  document.getElementById('cardDuty').innerHTML=`
    <div class="person-avatar ${ac(actual)}">${actual.slice(0,2)}</div>
    <div class="person-name">${actual}</div>
    <div class="person-tag">${skipped?`代理接替（${sched} 休假）`:'本週負責人'}</div>`;

  document.getElementById('cardSub').innerHTML=`
    <div class="person-avatar ${ac(dep)}">${dep.slice(0,2)}</div>
    <div class="person-name">${dep}</div>
    <div class="person-tag">指定代理 ${sched}</div>`;

  document.getElementById('cardVacation').innerHTML=onLeave.size===0
    ?`<div class="no-one">目前無休假人員 \uD83C\uDF89</div>`
    :`<div class="vacation-list">${[...onLeave].map(n=>`<div class="vacation-tag">\uD83C\uDFD6 ${n}</div>`).join('')}</div>`;

  const hols=getHolidays(selectedYear,selectedMonth);
  document.getElementById('cardHoliday').innerHTML=hols.length===0
    ?`<div class="no-one">本月無法定假日</div>`
    :`<div class="holiday-list">${hols.map(h=>`<div class="holiday-item"><span class="holiday-dot"></span><span>${selectedMonth}/${h.date}</span><span class="holiday-date">${h.name}</span></div>`).join('')}</div>`;

  document.getElementById('tableSubtitle').textContent=`${selectedYear} 年 ${selectedMonth} 月`;
}

function updateTable() {
  const tbody=document.getElementById('scheduleBody');
  tbody.innerHTML='';
  let mon=getMondayOf(new Date(selectedYear,selectedMonth-1,1));
  const thisMon=getMondayOf(new Date());
  for(let w=0;w<4;w++){
    const fri=new Date(mon);fri.setDate(fri.getDate()+4);
    const di=getDutyIndex(mon), sched=STAFF[di];
    const {idx:ai,skipped}=getActualDuty(di,onLeave);
    const actual=STAFF[ai], dep=DEPUTY[sched]||STAFF[(di+1)%4];
    const isCur=mon.getTime()===thisMon.getTime();
    const tr=document.createElement('tr');
    if(isCur) tr.classList.add('current-week');
    tr.innerHTML=`
      <td>
        <div class="${isCur?'week-badge current':'week-badge'}">${isCur?'\uD83D\uDCCC ':''} 第 ${w+1} 週</div>
        <div class="week-date">${fmtDate(mon)} – ${fmtDate(fri)}</div>
      </td>
      <td>
        <div class="person-cell">
          <div class="mini-avatar ${ac(actual)}">${actual.slice(0,2)}</div>
          <div><span>${actual}</span>${skipped?`<span class="replaced-badge">\u2191 接替 ${sched}</span>`:''}</div>
        </div>
      </td>
      <td>
        <div class="person-cell">
          <div class="mini-avatar ${ac(dep)}">${dep.slice(0,2)}</div>
          <span>${dep}</span>
        </div>
      </td>
      <td>
        <div class="tasks-cell">
          <span class="task-pill">\uD83C\uDFE2 清潔會議室</span>
          <span class="task-pill">\uD83E\uDDF9 前台拖地</span>
          <span class="task-pill">\uD83D\uDDD1 每日倒垃圾</span>
        </div>
      </td>`;
    tbody.appendChild(tr);
    mon.setDate(mon.getDate()+7);
  }
}

// EXCEL SYNC
const EXCEL_URL = 'http://172.17.11.81/kaohsiung_duty_roster.xlsx';

async function fetchExcelFromServer() {
  setSyncStatus('idle', '\uD83D\uDD04 正在連線...');
  try {
    const res = await fetch(EXCEL_URL, { cache: 'no-store' });
    if (!res.ok) throw new Error('\u4f3a\u670d\u5668\u56de\u61c9 ' + res.status);
    processExcelBuffer(await res.arrayBuffer());
  } catch (err) {
    setSyncStatus('error', '\u274C \u7121\u6cd5\u9023\u7dda\uff1a' + err.message);
  }
}

function processExcelBuffer(buffer) {
  try {
    const wb = XLSX.read(new Uint8Array(buffer), { type: 'array', cellFormula: false });
    const sn = wb.SheetNames.includes('\u5024\u65e5\u8a2d\u5b9a') ? '\u5024\u65e5\u8a2d\u5b9a'
      : wb.SheetNames.includes('\u8a2d\u5b9a') ? '\u8a2d\u5b9a'
      : wb.SheetNames.includes('\u4f11\u5047\u8a2d\u5b9a') ? '\u4f11\u5047\u8a2d\u5b9a'
      : wb.SheetNames[0];
    const rows = XLSX.utils.sheet_to_json(wb.Sheets[sn], { header:1, defval:'', raw:false });

    const kv = {};
    rows.forEach(row => {
      const k = String(row[0]||'').trim();
      const v = String(row[1]||'').trim();
      if (k && v) kv[k] = v;
    });

    const changed = [];

    // Rotation order
    const ns = ['\u7b2c 1 \u4f4d','\u7b2c 2 \u4f4d','\u7b2c 3 \u4f4d','\u7b2c 4 \u4f4d'].map(p=>kv[p]).filter(Boolean);
    if (ns.length===4) { STAFF.length=0; ns.forEach(n=>STAFF.push(n)); changed.push('\u8f2a\u5024\u9806\u5e8f'); renderChips(); }

    // Deputy rules
    let du=false;
    STAFF.forEach(name=>{ const d=kv[name+' \u7684\u4ee3\u7406\u4eba']; if(d){DEPUTY[name]=d;du=true;} });
    if(du) changed.push('\u4ee3\u7406\u4eba\u898f\u5247');

    // Leave
    const nl=new Set(), sum=[];
    STAFF.forEach(name=>{
      const leave=kv[name]==='\u662f'||(kv[name]||'').toLowerCase()==='yes';
      sum.push({name,leave}); if(leave) nl.add(name);
    });
    onLeave=nl;
    document.querySelectorAll('.vacation-chip').forEach(chip=>{
      if(onLeave.has(chip.dataset.name)) chip.classList.add('active');
      else chip.classList.remove('active');
    });
    changed.push('\u4f11\u5047\u72c0\u614b');

    // Manual override
    const md=kv['\u672c\u9031\u5024\u65e5\u4eba'];
    ANCHOR_OVERRIDE=(md&&STAFF.includes(md))?{monday:getMondayOf(new Date()),idx:STAFF.indexOf(md)}:null;
    if(ANCHOR_OVERRIDE) changed.push('\u5024\u65e5\u4eba('+md+')');

    document.getElementById('excelPreview').className='excel-preview visible';
    document.getElementById('excelPreview').innerHTML=
      '<span style="color:#374151;font-weight:800;">\u2705 \u5df2\u540c\u6b65\uff1a'+changed.join(' &middot; ')+'</span>&nbsp;&nbsp;'+
      sum.map(s=>`<span class="excel-chip ${s.leave?'leave':''}">${s.leave?'\uD83C\uDFD6 ':'\u2705 '}${s.name}</span>`).join('');

    setSyncStatus('success', '\u2705 \u540c\u6b65\u5b8c\u6210 &middot; ' + new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'}));
    updateAll();
  } catch(err) {
    setSyncStatus('error', '\u274C \u8b80\u53d6\u5931\u6557\uff1a' + err.message);
  }
}

function setSyncStatus(type, msg) {
  const el=document.getElementById('syncStatus');
  el.className='sync-status '+type; el.innerHTML=msg;
}

// BOOT
initControls();
updateAll();
fetchExcelFromServer();
</script>
